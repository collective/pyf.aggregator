
services:
  typesense:
    image: docker.io/typesense/typesense:28.0
    network_mode: "host"
    ports:
      - 8108:8108
    volumes:
      - ./data/typesense:/data
    command: --data-dir /data --api-key=$TYPESENSE_API_KEY --enable-cors

  redis:
    image: 'valkey/valkey:latest'
    network_mode: "host"
    volumes:
      - ./data/redis:/data
    command: valkey-server --bind 127.0.0.1

  celery-worker-1:
    build: .
    network_mode: "host"
    env_file: .env
    command: celery -A pyf.aggregator.queue worker --loglevel=info -n worker1@%h
    depends_on:
      - redis
      - typesense
    restart: unless-stopped

  celery-worker-2:
    build: .
    network_mode: "host"
    env_file: .env
    command: celery -A pyf.aggregator.queue worker --loglevel=info -n worker2@%h
    depends_on:
      - redis
      - typesense
    restart: unless-stopped

  celery-beat:
    build: .
    network_mode: "host"
    env_file: .env
    volumes:
      - ./data/celery:/data/celery
    command: celery -A pyf.aggregator.queue beat --loglevel=info --schedule /data/celery/celerybeat-schedule.db
    depends_on:
      - redis
    restart: unless-stopped
